name: Deploy Pawse to Azure

# Build the container image and roll the Azure Container App on every push to
# main. Authenticates to Azure with OIDC (federated credential) — no secrets,
# no passwords. The image is tagged with the commit SHA so each push produces a
# fresh, traceable Container App revision.

on:
  push:
    branches: [main]
    paths:
      - "cloud/**"
      - "app/**"
      - "scoring/**"
      - "data/alex_workday.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC token
  contents: read

env:
  ACR_NAME: acrpawse2ysupe36zqlhi
  RESOURCE_GROUP: rg-pawse
  CONTAINER_APP: ca-pawse-2ysupe36zqlhi
  IMAGE_REPO: pawse-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in ACR (cloud build, no Docker on the runner)
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_REPO:${{ github.sha }}" \
            --image "$IMAGE_REPO:latest" \
            --file cloud/Dockerfile .

      - name: Deploy image to Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_REPO:${{ github.sha }}"

      - name: Show live URL
        run: |
          FQDN=$(az containerapp show --name "$CONTAINER_APP" --resource-group "$RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### ✅ Deployed: https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
