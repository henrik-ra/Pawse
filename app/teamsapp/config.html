<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configure Pawse</title>
  <script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"
          crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      background: transparent; color: #e9eaee;
    }
    .card {
      max-width: 460px; text-align: center; padding: 28px 24px;
      background: #2b2b30; border: 1px solid #3d3d44; border-radius: 14px;
    }
    .panda { font-size: 40px; line-height: 1; margin-bottom: 6px; }
    h2 { margin: 6px 0 8px; font-size: 1.15rem; color: #fff; }
    p { color: #c7c9d1; font-size: .9rem; line-height: 1.45; margin: 0 0 6px; }
    .hint { color: #9aa0a4; font-size: .78rem; margin-top: 14px; }
    .ok { color: #6cd07f; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="panda">🐼</div>
    <h2>Pawse — wellbeing in this call</h2>
    <p>Pawse measures your fatigue, facial tension, emotion and vocal stress
       <strong>on your own device</strong> during the call.</p>
    <p>It runs automatically and saves to your dashboard when you leave.</p>
    <p class="hint" id="hint">Click <span class="ok">Save</span> to add Pawse to this meeting.</p>
  </div>
  <script>
    microsoftTeams.app.initialize().then(function () {
      microsoftTeams.pages.config.registerOnSaveHandler(function (saveEvent) {
        var panel = window.location.origin + "/teamsapp/meetingpanel.html?v=" + Date.now();
        microsoftTeams.pages.config.setConfig({
          entityId: "pawse-capture",
          contentUrl: panel,
          websiteUrl: panel,
          suggestedDisplayName: "Pawse"
        }).then(function () { saveEvent.notifySuccess(); });
      });
      microsoftTeams.pages.config.setValidityState(true);
    }).catch(function (e) {
      document.getElementById("hint").textContent = "Init error: " + e;
    });
  </script>
</body>
</html>
